<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Запуск Yalper...</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h2 { margin-bottom: 10px; }
        p { color: #888888; margin-bottom: 20px; }
        .close-btn {
            background-color: #1f538d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            display: none; /* Скрыта по умолчанию */
        }
        .close-btn:hover { background-color: #14375d; }
    </style>
</head>
<body>
    <div id="status">
        <h2>Открываем трек... 🎧</h2>
        <p>Если браузер спросит разрешение, нажмите <b>«Открыть»</b> или <b>«Разрешить»</b>.</p>
    </div>
    
    <!-- Кнопка для ручного закрытия, появится чуть позже -->
    <button id="closeBtn" class="close-btn" onclick="window.close()">Закрыть эту вкладку</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const trackData = urlParams.get('track');
        
        if (trackData) {
            // 1. Вызываем приложение Yalper
            window.location.href = "yalper://play/" + trackData;
            
            // 2. Ждем 4 секунды (4000 мс), чтобы человек успел нажать "Разрешить" в браузере
            setTimeout(() => {
                document.getElementById('status').innerHTML = "<h2>Трек открыт в Yalper! 🚀</h2><p>Теперь эту вкладку можно закрыть.</p>";
                document.getElementById('closeBtn').style.display = "block"; // Показываем кнопку
                
                // Пытаемся закрыть автоматически
                window.open('', '_self', ''); 
                window.close();
            }, 4000);
            
        } else {
            document.getElementById('status').innerHTML = "<h2>Ошибка 😔</h2><p>Данные трека не найдены в ссылке.</p>";
        }
    </script>
</body>
</html>
