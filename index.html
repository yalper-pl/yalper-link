<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Запуск Yalper...</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h2 { margin-bottom: 10px; }
        p { color: #888888; }
    </style>
</head>
<body>
    <div id="status">
        <h2>Открываем трек... 🎧</h2>
        <p>Если браузер спросит разрешение, нажмите «Открыть».</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const trackData = urlParams.get('track');
        
        if (trackData) {
            // 1. Вызываем приложение Yalper
            window.location.href = "yalper://play/" + trackData;
            
            // 2. Ждем полсекунды (чтобы ОС успела перехватить ссылку) 
            // и пытаемся агрессивно закрыть вкладку
            setTimeout(() => {
                // Меняем текст на случай, если браузер заблокирует закрытие
                document.getElementById('status').innerHTML = "<h2>Трек открыт в Yalper! 🚀</h2><p>Эту вкладку можно закрыть.</p>";
                
                // Хак для обхода защиты window.close()
                window.open('', '_self', ''); 
                window.close();
            }, 500);
            
        } else {
            document.getElementById('status').innerHTML = "<h2>Ошибка 😔</h2><p>Данные трека не найдены в ссылке.</p>";
        }
    </script>
</body>
</html>
